name: Validate USB Coding Workspace

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PSScriptAnalyzer
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber -ErrorAction Stop
          Write-Host "PSScriptAnalyzer installed successfully"
        shell: pwsh

      - name: Lint all PowerShell scripts
        run: |
          if (Test-Path ./Scripts) {
            $results = Invoke-ScriptAnalyzer -Path ./Scripts -Recurse -Severity @('Error','Warning') -ErrorAction Stop
            if ($results) {
              $results | Format-Table -AutoSize
              Write-Error "PSScriptAnalyzer found issues"
              exit 1
            }
            Write-Host "✅ No lint errors or warnings in Scripts/"
          } else {
            Write-Host "No ./Scripts folder found - skipping PowerShell lint"
          }
        shell: pwsh

      - name: Lint Markdown files
        run: |
          npm install -g markdownlint-cli2
          markdownlint-cli2 "**/*.md" "!node_modules/**" --config .markdownlint.json
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Markdown lint failed with code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "✅ Markdown lint passed"
        shell: pwsh

      - name: Verify key structure (non-blocking for docs repo)
        run: |
          if (Test-Path Scripts) {
            Write-Host "✅ Scripts/ present"
          } else {
            Write-Warning "Scripts/ folder missing"
          }
          Write-Host "✅ Basic validation complete (full VMs/Workspace layout expected on portable media, not in this source repo)"
        shell: pwsh

      - name: Summary
        run: |
          Write-Host "✅ USB Coding Workspace validation passed!"
        shell: pwsh

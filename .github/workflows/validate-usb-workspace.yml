name: Validate USB Coding Workspace

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # No actions/setup-powershell needed — GitHub Windows runners include pwsh by default

      - name: Install PSScriptAnalyzer
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber
        shell: pwsh

      - name: Lint all PowerShell scripts
        run: |
          if (Test-Path ./Scripts) {
            $results = Invoke-ScriptAnalyzer -Path ./Scripts -Recurse -Severity @('Error','Warning')
            if ($results) {
              $results | Format-Table -AutoSize
              exit 1
            }
            Write-Host "✅ No lint errors or warnings in Scripts/"
          } else {
            Write-Host "No ./Scripts folder found - skipping PowerShell lint"
          }
        shell: pwsh

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**

      - name: Verify key structure (non-blocking for docs repo)
        run: |
          if (Test-Path Scripts) {
            Write-Host "✅ Scripts/ present"
          } else {
            Write-Warning "Scripts/ folder missing"
          }
          Write-Host "✅ Basic validation complete (full VMs/Workspace layout expected on portable media, not in this source repo)"
        shell: pwsh

      - name: Summary
        run: |
          Write-Host "✅ USB Coding Workspace validation passed!"
        shell: pwsh
